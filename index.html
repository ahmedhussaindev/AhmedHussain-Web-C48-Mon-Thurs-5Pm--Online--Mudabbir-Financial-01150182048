<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدبّر | إدارة أموالك بذكاء</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@100;200;300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="icon" href="./images/favicon.png">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="main-container">
        <!-- start side-bar -->
        <aside class="side-bar">
            <div class="logo">
                <img class="logo-image" src="images/icons/coins-solid-full.png" alt="logo-image">
                <div class="logo-text">
                    <h1>مدبّر</h1>
                    <p>إدارة أموالك بذكاء</p>
                </div>
            </div>
            <ul class="page-container">
                <li>
                    <div class="side-page home-page">
                        <img src="images/icons/house-solid-full.png" alt="home-page-icon">
                        <span>الصفحة الرئيسية</span>
                    </div>
                </li>
                <li>
                    <div class="side-page">
                        <img src="images/icons/arrow-right-arrow-left-solid-full.png" alt="arrow-right-arrow-left-icon">
                        <span>المعاملات</span>
                    </div>
                </li>
                <li>
                    <div class="side-page">
                        <img src="images/icons/chart-pie-solid-full.png" alt="chart-pie-icon">
                        <span>الميزانيات</span>
                    </div>
                </li>
                <li>

                    <div class="side-page">
                        <img src="images/icons/piggy-bank-solid.png" alt="piggy-bank-icon">
                        <span>المدخرات</span>
                    </div>
                </li>
                <li>
                    <div class="side-page">
                        <img src="images/icons/file-invoice-dollar-solid-full.png" alt="file-invoice-dollar-icon">
                        <span>الفواتير الشهرية</span>
                    </div>
                </li>
            </ul>

            <div class="side-feature-container">
                <h3>إجراءات سريعة</h3>
                <ul>
                    <li>
                        <div class="side-feature">
                            <img class="send-money" src="images/icons/paper-plane-solid-full.png"
                                alt="paper-plane-icon">
                            <span>إرسال أموال</span>
                        </div>
                    </li>
                    <li>
                        <div class="side-feature">
                            <img class="add-money" src="images/icons/plus-solid-full.png" alt="plus-icon">
                            <span>إضافة أموال</span>
                        </div>
                    </li>
                    <li>
                        <div class="side-feature">
                            <img class="buy-a-bill" src="images/icons/receipt-solid-full.png" alt="receipt-icon">
                            <span>دفع فاتورة</span>
                        </div>

                    </li>
                    <li>
                        <div class="side-feature">
                            <img class="investment" src="images/icons/chart-line-solid-full.png" alt="chart-line-icon">
                            <span>استثمار</span>
                        </div>
                    </li>
                </ul>
            </div>

        </aside>
        <!-- end side-bar -->

        <main class="container">

            <header class="nav-bar">
                <!-- Navigation Bar -->
            </header>

            <section class="current-balance">
                <!-- Current Balance -->helloword
            </section>

            <section class="income">
                <!-- Income -->helloword
            </section>

            <section class="expenses">
                <!-- Expenses -->helloword
            </section>

            <section class="recent-activities">
                <!-- Recent Activities -->
            </section>

            <section class="monthly-bills">
                <!-- Monthly Bills -->helloword
            </section>

            <section class="recent-transactions">
                <!-- Recent Transactions -->helloword
            </section>

            <section class="income-versus-expenses">
                <!-- Income vs Expenses -->helloword
            </section>

            <section class="account-summary">
                <!-- Account Summary -->helloword
            </section>

            <section class="payment-methods">
                <!-- Payment Methods -->helloword
            </section>

            <section class="budget-overview">
                <!-- Budget Overview -->helloword
            </section>

        </main>
    </div>


</body>

</html>
